<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Helpdesk Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #f2f4f8;
}

.sidebar {
    width: 250px;
    background: #1c305b;
    color: white;
    padding: 20px;
    position: relative;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.menu-item {
    padding: 12px;
    margin-bottom: 10px;
    background: #223a5f;
    border-radius: 5px;
    cursor: pointer;
}

.menu-item:hover {
    background: #2f4c7a;
}

.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    justify-content: center;
}

.content {
    width: 100%;
    max-width: 900px;
}

#pageTitle {
    font-size: 22px;
    margin-bottom: 15px;
    font-weight: bold;
}

#ticketContainer {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.ticket {
    background: white;
    border-radius: 12px;
    padding: 25px;
    min-height: 120px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    position: relative;
}
.ticket:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    transition: 0.2s ease;
}
.ticket-id {
    font-size: 12px;
    opacity: 0.5;
}

.ticket-title {
    font-size: 20px;
    margin: 10px 0;
    font-weight: 600;
}

.ticket-time {
    font-size: 13px;
    opacity: 0.6;
}

.ticket-status {
    position: absolute;
    right: 15px;
    top: 15px;
    font-weight: bold;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    text-transform: uppercase;
}

.open { background: #e6fff2; color: #00b86b; }
.pending { background: #fff6e0; color: #f5a623; }
.closed { background: #ffe6e6; color: #e74c3c; }

.profile {
    position: absolute;
    bottom: 20px;
    width: 210px;
    text-align: center;
    padding-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
}

.avatar {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    margin-bottom: 8px;
}
.ticket {
    position: relative;
}

.assigned {
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 11px;
    background: #f3f7fa;
    color: #010407;
    padding: 4px 10px;
    border-radius: 12px;
}
#searchInput {
    position: absolute;
    top: 20px;
    right: 50px;
    width: 200px;
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Helpdesk</h2>

    <div class="menu-item" onclick="showAllTickets()">All Tickets</div>
    <div class="menu-item" onclick="showMyTickets()">My Open & Pending Tickets</div>
    <div class="menu-item" onclick="showClosedTickets()">Closed Tickets</div>
    <div class="menu-item" onclick="showUnresolvedTickets()">Unresolved Tickets</div>

    <div class="profile">
        <img src="img1.jpg" class="avatar">
        <div id="agentName">Agent</div>
    </div>
</div>

<div class="main">
    <div class="content">
        <div id="pageTitle">All Tickets</div>
        <input type="text" id="searchInput" placeholder="Search by ID" oninput="searchTicket()">
        <div id="ticketContainer"></div>
    </div>
</div>

<script>
let currentAgent = "agent";

let container;
let title;

let tickets = [
    {id:100001, klient:"Leila Riley", problem:"System is slow", status:"Open", time:"1 day ago", assigned:"other"},
    {id:100002, klient:"Erik Durham", problem:"Login issue", status:"Pending", time:"2 days ago", assigned:"agent"},
    {id:100003, klient:"Martin Harris", problem:"Permission denied", status:"Closed", time:"3 days ago", assigned:"other"},
    {id:100004, klient:"Leona Houston", problem:"WiFi issue", status:"Open", time:"1 day ago", assigned:"agent"},
    {id:100005, klient:"Alice Jacobs", problem:"Email not sending", status:"Pending", time:"4 days ago", assigned:"agent"},
    {id:100006, klient:"Charli Branch", problem:"Account locked", status:"Closed", time:"5 days ago", assigned:"other"},
    {id:100007, klient:"Stella Andersen", problem:"File upload error", status:"Open", time:"2 days ago", assigned:"agent"},
    {id:100008, klient:"Jonah Lynn", problem:"System crash", status:"Open", time:"1 day ago", assigned:"other"},
    {id:100009, klient:"Adelina Patrick", problem:"Slow internet", status:"Pending", time:"2 days ago", assigned:"agent"},
    {id:100010, klient:"Elaine David", problem:"Cannot login", status:"Closed", time:"2 days ago", assigned:"other"},
    {id:100011, klient:"Leila Riley", problem:"System is slow", status:"Open", time:"1 day ago", assigned:"agent"},
    {id:100012, klient:"Erik Durham", problem:"Login issue", status:"Pending", time:"2 days ago", assigned:"agent"},
    {id:100013, klient:"Martin Harris", problem:"Permission denied", status:"Closed", time:"3 days ago", assigned:"other"},
    {id:100014, klient:"Leona Houston", problem:"WiFi issue", status:"Open", time:"1 day ago", assigned:"agent"},
    {id:100015, klient:"Alice Jacobs", problem:"Email not sending", status:"Pending", time:"4 days ago", assigned:"agent"},
    {id:100016, klient:"Charli Branch", problem:"Account locked", status:"Closed", time:"5 days ago", assigned:"other"},
    {id:100017, klient:"Stella Andersen", problem:"File upload error", status:"Open", time:"2 days ago", assigned:"agent"},
    {id:100018, klient:"Jonah Lynn", problem:"System crash", status:"Open", time:"1 day ago", assigned:"other"},
    {id:100019, klient:"Adelina Patrick", problem:"Slow internet", status:"Pending", time:"2 days ago", assigned:"agent"},
    {id:100020, klient:"Elaine David", problem:"Cannot login", status:"Closed", time:"2 days ago", assigned:"other"}
];
localStorage.setItem("allTickets", JSON.stringify(tickets));

window.onload = function () {
    container = document.getElementById("ticketContainer");
    title = document.getElementById("pageTitle");

    
    showAllTickets();

    let savedName = localStorage.getItem("agentName");
    let agentEl = document.getElementById("agentName");

    if (savedName && agentEl) {
        agentEl.innerText = savedName;
    }
};

function showAllTickets() {
    title.innerText = "All Tickets";
    render(tickets);
}

function showMyTickets() {
    title.innerText = "My Tickets";

    let filtered = tickets.filter(t =>
        t.assigned === currentAgent &&
        (t.status === "Open" || t.status === "Pending")
    );

    render(filtered);
}
function showClosedTickets() {
    title.innerText = "Closed Tickets";

    let filtered = tickets.filter(t => 
        t.status.toLowerCase() === "closed"
    );

    render(filtered);
}
function showUnresolvedTickets() {
    title.innerText = "Unresolved Tickets";

    let filtered = tickets.filter(t =>
        t.status === "Waiting for Customer"
    );

    render(filtered);
}
function render(data) {
    container.innerHTML = data.map(t => `
        <div class="ticket" onclick="openTicket(${t.id})">
            <div class="ticket-id">#${t.id}</div>
            <div class="ticket-title">${t.klient} - ${t.problem}</div>
            <div class="ticket-time">${t.time}</div>
            <div class="ticket-status ${t.status.toLowerCase()}">${t.status}</div>
        ${
                t.assigned === currentAgent &&
                (t.status === "Open" || t.status === "Pending")
                ? '<div class="assigned">Assigned to you</div>'
                : ''
            }

        </div>
    `).join("");
}
function searchTicket() {
    let value = document.getElementById("searchInput").value.trim();

    if (value === "") {
        render(tickets); 
        return;
    }

    let filtered = tickets.filter(t =>
        t.id.toString().includes(value)
    );

    render(filtered);
}
function openTicket(id) {
    localStorage.setItem("selectedTicket", id);
    window.location.href = "page3.html";
}
</script>
</body>
</html>
